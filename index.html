<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>티몬예제</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            background-color: #f4f4f4;
        }
        #all{
            width: 800px;
            margin: 0 auto;
        }
        header{
            height: 94px;
            position: relative;
        }
        #logo{
            position: absolute;
            top: 50px;
            left: 10px;
        }
        #interior{
            position: absolute;
            left: 320px;
        }
        section{
            height: 30px;
            background-color: #2dbfb4;
            position: relative;
            text-align: right;
            
        }
        #thing{
            position: absolute;
            /* 15/2=7.5
            top: 7.5px;
            400-140=260
            left: 260px; */
            top: 50%;
            left: 50%;
            /* transform: translateX(-50%),translateY(-50%); */
            transform: translate(-50%,-50%);
        }
        section>b{
            position: absolute;
            top: 6px;
            left: 700px;
            font-size: 15px;
            color: white;
        }
        .div4{
            background-color: white;
            height: 330px;
            float: left;
        }
        .div4>img{
            /* 263x3=789 */
            width: 263px;
            
        }
        .ex1{
            margin-top: 10px;
            color: red;
            margin-left: 8px;
            font-size: 15px;
            float: left
        }
        .ex2{
            margin-top: 8px;
            font-size: 15px;
            margin-right: 10px;
            float: right;
        }
        .ml{
            margin-left: 5.5px;
        }
    </style>
</head>
<body>
    <div id="all">
        <header>
            <img src="image/top_logo.jpg" alt="" id="logo">
            <img src="image/top_interior.jpg" alt="" id="interior">
        </header>
        <section>
            <img src="image/text_interior.jpg" alt="" id="thing">
            <b>2026.06.08</b>
        </section>
        <div id="div3">
            <img src="image/middle.jpg" alt="">
        </div>
        <div class="div4">
            <img src="image/tmon01.jpg" alt="">
            <br>
            <b class="ex1">티몬가</b>
            <b class="ex2">아직도 앉아 있나요? 바른<br>
            자세 스탠딩 책상</b>
        </div>
        <div class="div4 ml">
            <img src="image/tmon02.jpg" alt="">
            <br>
            <b class="ex1">티몬가</b>
            <b class="ex2">드라마 같은 홈스타일<br>
            분위기 있는 스탠드</b>
        </div>
        <div class="div4 ml">
            <img src="image/tmon03.jpg" alt="">
            <br>
            <b class="ex1">티몬가</b>
            <b class="ex2">집에서 하는 냅킨공예</b>
        </div>
    </div>
</body>
</html>
